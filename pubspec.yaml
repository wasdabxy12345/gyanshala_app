name: gyanshala_app
description: "A new Flutter project."
publish_to: "none"

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/splash/splash.png
  android: true
  ios: false
  android_12:
    image: assets/splash/splash.png
    color: "#ffffff"

version: 0.0.2+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.2
  shared_preferences: ^2.2.0
  firebase_messaging: ^16.1.3
  firebase_core: ^4.6.0
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  fl_chart: ^1.2.0
  riverpod_annotation: ^4.0.2
  intl: ^0.20.2
  dropdown_search: ^7.0.0
  package_info_plus: ^9.0.1
  http: ^1.2.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0
  ota_update: ^7.0.1
  file_picker: ^11.0.2
  excel: ^4.0.6
  collection: ^1.18.0
  google_maps_flutter: ^2.17.0
  flutter_native_splash: ^2.4.4
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/splash/splash.png
    - assets/icon/logo.png
    - assets/images/shiksha_setu_logo.png
